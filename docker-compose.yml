services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: juggerhub-backend
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=database;Port=5432;Database=${DB_NAME:-appdb};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      # SignalR backplane + distributed rate-limit counters (feature 019). Required: the app
      # fails fast without it outside Development, because a missing backplane in a multi-replica
      # deployment is invisible until two users land on different pods.
      - ConnectionStrings__Redis=${REDIS_CONNECTION:-redis:6379}
      - Jwt__Issuer=${JWT_ISSUER:-juggerhub}
      - Jwt__Audience=${JWT_AUDIENCE:-juggerhub}
      - Jwt__SigningKey=${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set in .env}
      - Jwt__AccessTokenLifetimeMinutes=${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      - Email__Provider=${EMAIL_PROVIDER:-Smtp}
      - Email__SmtpHost=mailpit
      - Email__SmtpPort=1025
      - Email__FromAddress=${EMAIL_FROM_ADDRESS:-no-reply@juggerhub.local}
      - Email__FrontendBaseUrl=${EMAIL_FRONTEND_BASE_URL:-http://localhost:3000}
      - Email__Resend__ApiKey=${EMAIL_RESEND_API_KEY:-}
      # Feature 012 — temporary platform-admin allowlist (comma-separated emails). See GH #21.
      - Admin__Emails=${ADMIN_EMAILS:-}
      # Feature 028 — outbound resilience limits (constitution VII). Passed through even though
      # local email goes to Mailpit over SMTP, so the configuration path itself is exercised
      # locally rather than existing only in deployed environments (Principle V).
      - Resilience__Outbound__Resend__AttemptTimeoutSeconds=${RESILIENCE_RESEND_ATTEMPT_TIMEOUT_SECONDS:-10}
      - Resilience__Outbound__Resend__TotalTimeoutSeconds=${RESILIENCE_RESEND_TOTAL_TIMEOUT_SECONDS:-30}
      - Resilience__Outbound__Resend__MaxRetryAttempts=${RESILIENCE_RESEND_MAX_RETRY_ATTEMPTS:-3}
      - Resilience__Outbound__Resend__BreakerMinimumThroughput=${RESILIENCE_RESEND_BREAKER_MIN_THROUGHPUT:-5}
    networks:
      - juggerhub-network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: juggerhub-frontend
    ports:
      - "3000:80"
    networks:
      - juggerhub-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 (not localhost) — nginx listens on IPv4 only, and busybox
      # wget would otherwise try IPv6 ::1 and get connection-refused.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  database:
    image: postgres:18.3-alpine
    container_name: juggerhub-database
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-appdb}
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ stores data in a major-version-specific subdirectory and
      # expects the volume mounted at /var/lib/postgresql (not .../data, which
      # was the convention up to Postgres 16). See docker-library/postgres#1259.
      - db-data:/var/lib/postgresql
    networks:
      - juggerhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-appdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Redis backs the SignalR backplane and the distributed rate-limit counters (feature 019).
  # It runs LOCALLY as well as in Dev/Prod on purpose: the deployment runs more than one replica,
  # and constitution V limits environment differences to configuration and secrets — never
  # architecture. A local-only in-process fallback would mean local development exercised a
  # different fan-out path than production, which is exactly the class of bug this component
  # exists to prevent. Redis holds no durable state: in-flight fan-out and one-minute counters
  # only, so it needs no volume and losing it costs liveness, never data.
  redis:
    image: redis:8.2-alpine
    container_name: juggerhub-redis
    networks:
      - juggerhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.29.1
    container_name: juggerhub-mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - juggerhub-network

networks:
  juggerhub-network:
    driver: bridge

volumes:
  db-data:
