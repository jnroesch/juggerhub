name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# GITHUB_TOKEN needs packages:write to push images to GHCR; contents:read for checkout.
permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: backend/global.json

      # Socket Firewall is intentionally NOT applied to NuGet/.NET for now —
      # Free does not support NuGet; firewalling `dotnet restore` would require
      # Socket Firewall Enterprise (mode: firewall-enterprise + socket-token).
      - name: Restore dependencies
        run: dotnet restore JuggerHub.slnx

      - name: Build
        run: dotnet build JuggerHub.slnx --no-restore

      - name: Test
        run: dotnet test JuggerHub.slnx --no-build --verbosity normal

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Builds the runtime stage of backend/Dockerfile. On PRs the image is built
      # (validating the Dockerfile) but not pushed; pushes happen on branch pushes.
      # No secrets are baked in — runtime config is injected at deploy time.
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'frontend/.nvmrc'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Socket Firewall blocks known/AI-detected malicious npm packages
      # (including transitive deps) before they are installed.
      - name: Set up Socket Firewall
        uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Builds the runtime (nginx) stage of frontend/Dockerfile. On PRs the image
      # is built but not pushed; pushes happen on branch pushes.
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
