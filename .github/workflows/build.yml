name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Socket Firewall is intentionally NOT applied to NuGet/.NET for now —
      # Free does not support NuGet; firewalling `dotnet restore` would require
      # Socket Firewall Enterprise (mode: firewall-enterprise + socket-token).
      - name: Restore dependencies
        run: dotnet restore JuggerHub.slnx

      - name: Build
        run: dotnet build JuggerHub.slnx --no-restore

      - name: Test
        run: dotnet test JuggerHub.slnx --no-build --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Socket Firewall blocks known/AI-detected malicious npm packages
      # (including transitive deps) before they are installed.
      - name: Set up Socket Firewall
        uses: SocketDev/action@v1
        with:
          mode: firewall-free

      - name: Install dependencies
        run: sfw npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
