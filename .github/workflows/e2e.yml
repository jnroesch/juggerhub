name: E2E

# Containerized Playwright suite (desktop + mobile) against a throwaway full stack.
# Runs on PRs and pushes so e2e spec rot is caught at review time rather than only
# during occasional manual runs (GitHub issue #23).
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Runtime config for the throwaway stack. No real secrets — this is an
      # isolated, disposable environment torn down at the end of the job. The
      # admin allowlist matches the e2e fixtures (admin-area.spec.ts).
      - name: Write stack config
        run: |
          cat > .env <<'EOF'
          JWT_SIGNING_KEY=ci-e2e-signing-key-not-a-secret-0123456789abcdef
          ADMIN_EMAILS=admin@test.de
          EOF

      # Bring up an isolated stack (own project name, no published ports, no pinned
      # container names) with a fresh database, and wait for healthchecks.
      - name: Start stack
        run: |
          docker compose -p juggerhub-e2e \
            -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.e2e.yml \
            up -d --build --wait backend frontend mailpit

      - name: Run Playwright suite
        run: |
          # Bind-mount the report/trace output dir out of the throwaway container
          # (the preset writes html + blob reports and traces under
          # dist/.playwright inside /app) so it survives `run --rm` + teardown and
          # can be uploaded on failure. Create it first so it is owned by the runner.
          mkdir -p playwright-artifacts
          docker compose -p juggerhub-e2e \
            -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.e2e.yml \
            run --rm --build \
            -v "${{ github.workspace }}/playwright-artifacts:/app/dist/.playwright" \
            playwright

      # The HTML report + traces (trace: on-first-retry) let a failure be replayed
      # locally: download the artifact, then `npx playwright show-report <dir>`.
      # Only on failure — a green run has no traces and the report is just noise.
      - name: Upload Playwright report and traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-artifacts
          retention-days: 7
          if-no-files-found: warn

      # Surface stack logs when something fails — the disposable stack is gone after teardown.
      - name: Dump stack logs on failure
        if: failure()
        run: |
          docker compose -p juggerhub-e2e \
            -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.e2e.yml \
            logs --no-color

      - name: Tear down
        if: always()
        run: |
          docker compose -p juggerhub-e2e \
            -f docker-compose.yml -f docker-compose.test.yml -f docker-compose.e2e.yml \
            down -v --remove-orphans
