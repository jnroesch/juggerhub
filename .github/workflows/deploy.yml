name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build"]
    types:
      - completed
    branches: [main]

# Deploy jobs pull the images published by the Build workflow from GHCR.
permissions:
  contents: read
  packages: read

# Serialize deploys so two runs can't race on the same environment.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- dev: always runs once Build succeeds (or on manual dispatch) -----------
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    # workflow_run fires on completion regardless of result; only deploy when the
    # Build workflow actually succeeded. Manual runs (workflow_dispatch) have no
    # workflow_run payload, so conclusion is empty — allow those through too.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      # TODO: replace placeholders with the real dev deploy once the target is known.
      # The images are at:
      #   ghcr.io/${{ github.repository }}/backend
      #   ghcr.io/${{ github.repository }}/frontend
      # Typical shape:
      #   - docker/login-action@v3 (registry: ghcr.io, token: GITHUB_TOKEN) to pull
      #   - deploy step (ssh / k8s / compose on host) using dev secrets from this
      #     `development` environment (JWT_SIGNING_KEY, DB creds, etc.)
      - name: Deploy to dev
        run: echo "Deploy to DEV — target not yet configured"

  # --- prod: only after dev succeeds, and gated by manual approval -----------
  # Manual approval is enforced by a "Required reviewers" protection rule on the
  # `production` GitHub Environment (Settings → Environments → production).
  # `needs: deploy-dev` enforces the "prod only after a successful dev deploy" order.
  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production

    steps:
      - uses: actions/checkout@v4

      # TODO: replace placeholders with the real prod deploy once the target is known.
      # Same shape as dev, but using prod secrets from the `production` environment.
      - name: Deploy to prod
        run: echo "Deploy to PROD — target not yet configured"
