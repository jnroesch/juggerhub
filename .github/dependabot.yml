version: 2
updates:
  # Backend — .NET / NuGet
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      backend-dependencies:
        patterns:
          - "*"

  # Frontend — npm
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  # Container images
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly

  # Infrastructure — Terraform
  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: weekly

  # CI — GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-dependencies:
        patterns:
          - "*"
