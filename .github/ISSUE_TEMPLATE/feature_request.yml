name: 💡 Request a feature
description: Suggest a new feature or an improvement to something that already exists.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make JuggerHub better? We'd love to hear it. No technical
        detail needed — just describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: What's the need or frustration behind this idea?
      placeholder: e.g. As a team captain, I want to see who's coming to training so I can plan drills.
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you're imagining.
      placeholder: e.g. A simple attendance list on each training event showing yes / no / maybe.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Anything you do today to work around it? (optional)
      placeholder: e.g. Right now I ask everyone in a group chat and count by hand.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which part of JuggerHub is this about?
      options:
        - Not sure
        - Profiles
        - Teams
        - Events / training
        - Search / browse
        - Notifications
        - Sign in / accounts
        - Home / navigation
        - Something else
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and didn't find this request already.
          required: false
