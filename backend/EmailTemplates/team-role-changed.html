<div class="content">
    <p class="eyebrow">Team update</p>
    <h1>Your role in {{TEAM_NAME}} changed.</h1>

    <p>{{ACTOR_LINE}} You're now {{ROLE_PHRASE}} of {{TEAM_NAME}}.</p>

    <!-- Team card -->
    <div style="border:1px solid #EAE1D2;border-radius:16px;overflow:hidden;margin:22px 0 0;">
        <div style="height:6px;background:linear-gradient(105deg,#F5623A,#7A9B87);line-height:6px;font-size:0;">&nbsp;</div>
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;">
            <tr>
                <td valign="middle" style="padding:16px;width:48px;">
                    <div style="width:48px;height:48px;border-radius:12px;background:#DBE6DE;text-align:center;line-height:48px;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3B5145" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;">
                            <path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"></path>
                            <path d="m9 12 2 2 4-4"></path>
                        </svg>
                    </div>
                </td>
                <td valign="middle" style="padding:16px 16px 16px 0;">
                    <div style="font-family:'Hubot Sans',Arial,sans-serif;font-weight:800;font-size:18px;color:#241F18;">{{TEAM_NAME}}</div>
                    <div style="margin-top:6px;">
                        <span style="display:inline-block;padding:3px 10px;background:#EEF3EF;color:#3B5145;font-size:12px;font-weight:600;border-radius:999px;">{{ROLE_LABEL}}</span>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <p style="margin:24px 0 4px;">
        <a href="{{TEAM_URL}}" class="button">Open your team</a>
    </p>

    <p class="alt-link">
        Button not working? Paste this link into your browser:<br>
        <a href="{{TEAM_URL}}">{{TEAM_URL}}</a>
    </p>
</div>
