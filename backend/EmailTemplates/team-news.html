<div class="content">
    <p class="eyebrow">Team news</p>
    <h1>News from {{TEAM_NAME}}.</h1>

    <p>{{AUTHOR_LINE}} posted an update to {{TEAM_NAME}}:</p>

    <!-- News excerpt card -->
    <div style="border:1px solid #EAE1D2;border-radius:16px;overflow:hidden;margin:22px 0 0;">
        <div style="height:6px;background:linear-gradient(105deg,#F5623A,#7A9B87);line-height:6px;font-size:0;">&nbsp;</div>
        <div style="padding:18px;">
            <p style="margin:0;font-family:'Mona Sans',Arial,sans-serif;font-size:15px;line-height:1.6;color:#3E362B;">{{NEWS_EXCERPT}}</p>
        </div>
    </div>

    <p style="margin:24px 0 4px;">
        <a href="{{TEAM_URL}}" class="button">Read on JuggerHub</a>
    </p>

    <p class="alt-link">
        Button not working? Paste this link into your browser:<br>
        <a href="{{TEAM_URL}}">{{TEAM_URL}}</a>
    </p>
</div>
