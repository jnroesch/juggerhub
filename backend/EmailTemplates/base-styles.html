<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>{{EMAIL_TITLE}}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #374151;
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
            background-color: #f9fafb;
        }
        
        .email-container {
            background-color: #ffffff;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 32px 24px;
            text-align: center;
            position: relative;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/><circle cx="20" cy="20" r="15" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/><circle cx="80" cy="80" r="20" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/></svg>') center/cover;
            opacity: 0.3;
        }
        
        .header-content {
            position: relative;
            z-index: 1;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.025em;
        }
        
        .tagline {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
            font-weight: 400;
        }
        
        .content {
            padding: 40px 32px;
            background-color: #ffffff;
        }
        
        .content h1 {
            color: #111827;
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 24px 0;
            line-height: 1.3;
        }
        
        .content h2 {
            color: #374151;
            font-size: 20px;
            font-weight: 600;
            margin: 32px 0 16px 0;
            line-height: 1.3;
        }
        
        .content p {
            margin: 0 0 16px 0;
            color: #4b5563;
            line-height: 1.6;
        }
        
        .button {
            display: inline-block;
            background-color: #4f46e5 !important; /* Fallback for email clients that don't support gradients */
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%) !important;
            color: #ffffff !important;
            padding: 14px 28px !important;
            text-decoration: none !important;
            border-radius: 8px !important;
            margin: 24px 0 !important;
            font-weight: 600 !important;
            text-align: center !important;
            border: 2px solid #4f46e5 !important;
            font-size: 16px !important;
            line-height: 1.2 !important;
            mso-padding-alt: 0; /* Outlook padding fix */
            text-shadow: none !important; /* Ensure no text shadow interferes */
            -webkit-text-size-adjust: none !important;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif !important;
        }
        
        /* Additional email client specific overrides */
        a.button {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        a.button:link {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        a.button:visited {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        a.button:hover {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        a.button:active {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        /* Gmail specific fixes */
        u + .body .button {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        /* Apple Mail specific fixes */
        @media screen and (-webkit-min-device-pixel-ratio: 0) {
            .button {
                color: #ffffff !important;
            }
        }
        
        /* Outlook specific fixes */
        [owa] .button {
            color: #ffffff !important;
            text-decoration: none !important;
        }
        
        .button:hover {
            background-color: #4338ca !important;
            background: linear-gradient(135deg, #4338ca 0%, #6d28d9 100%) !important;
            color: #ffffff !important;
            text-decoration: none !important;
            border-color: #4338ca !important;
        }
        
        .button-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
            box-shadow: none;
        }
        
        .button-secondary:hover {
            background: #e5e7eb;
            color: #111827;
            transform: none;
        }
        
        .highlight-box {
            background: linear-gradient(135deg, #eff6ff 0%, #f0f9ff 100%);
            border-left: 4px solid #3b82f6;
            padding: 20px;
            margin: 24px 0;
            border-radius: 0 8px 8px 0;
        }
        
        .highlight-box h4 {
            color: #1e40af;
            margin: 0 0 12px 0;
            font-size: 16px;
            font-weight: 600;
        }
        
        .highlight-box ul {
            margin: 0;
            padding-left: 20px;
            color: #1e40af;
        }
        
        .highlight-box li {
            margin: 8px 0;
        }
        
        .info-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin: 24px 0;
        }
        
        .token-info {
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 16px;
            margin: 24px 0;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
            word-break: break-all;
            line-height: 1.4;
        }
        
        .url-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            word-break: break-all;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            font-size: 13px;
            margin: 16px 0;
        }
        
        .footer {
            background-color: #f9fafb;
            padding: 32px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }
        
        .footer-content {
            max-width: 400px;
            margin: 0 auto;
        }
        
        .footer p {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #6b7280;
            line-height: 1.5;
        }
        
        .footer .company-name {
            font-weight: 600;
            color: #374151;
        }
        
        .footer .links {
            margin: 20px 0;
        }
        
        .footer .links a {
            color: #4f46e5;
            text-decoration: none;
            margin: 0 12px;
            font-size: 14px;
        }
        
        .footer .links a:hover {
            text-decoration: underline;
        }
        
        .social-links {
            margin: 16px 0;
        }
        
        .social-links a {
            display: inline-block;
            margin: 0 8px;
            color: #9ca3af;
            text-decoration: none;
        }
        
        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }
        
        /* Responsive Design */
        @media (max-width: 600px) {
            body {
                margin: 0;
                padding: 0;
            }
            
            .email-container {
                margin: 0;
                border-radius: 0;
            }
            
            .header {
                padding: 24px 20px;
            }
            
            .content {
                padding: 32px 20px;
            }
            
            .footer {
                padding: 24px 20px;
            }
            
            .button {
                display: block;
                text-align: center;
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        {{EMAIL_CONTENT}}
    </div>
</body>
</html>
