<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <meta name='color-scheme' content='light'>
    <meta name='supported-color-schemes' content='light'>
    <title>{{EMAIL_TITLE}}</title>
    <style>
        /* ============================================================
           JuggerHub email base — warm sand neutrals, coral primary,
           sage secondary, lemon highlight. Mirrors DESIGN.md.
           Fonts: Hubot Sans (display) + Mona Sans (body), Arial
           fallback for clients that strip web fonts.
           ============================================================ */

        body {
            font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            line-height: 1.6;
            color: #3E362B;            /* text-body / sand-8 */
            margin: 0;
            padding: 0;
            background-color: #F4EEE3;  /* surface-sunken / sand-1 */
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
        }

        .email-outer {
            width: 100%;
            background-color: #F4EEE3;
            padding: 24px 16px;
        }

        /* The white rounded card that holds header + content + footer */
        .email-container {
            max-width: 552px;
            margin: 0 auto;
            background-color: #ffffff;   /* surface-card */
            border: 1px solid #EAE1D2;   /* sand-2 */
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(64, 46, 24, 0.10);
        }

        /* ---------------- Header ---------------- */
        .header {
            padding: 32px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #F4EEE3;
        }

        .brand-lockup {
            display: inline-block;
        }

        .brand-mark {
            display: inline-block;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: linear-gradient(135deg, #F5623A, #7A9B87);
            vertical-align: middle;
            line-height: 32px;
            text-align: center;
        }

        .brand-name {
            font-family: 'Hubot Sans', Arial, sans-serif;
            font-weight: 800;
            font-size: 21px;
            color: #241F18;             /* text-heading / sand-9 */
            letter-spacing: -0.02em;
            vertical-align: middle;
            margin-left: 10px;
        }

        /* ---------------- Content ---------------- */
        .content {
            padding: 34px 40px 30px;
            background-color: #ffffff;
        }

        .eyebrow {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #82725B;             /* text-muted / sand-6 */
            margin: 0;
        }

        .content h1 {
            font-family: 'Hubot Sans', Arial, sans-serif;
            font-size: 27px;
            line-height: 1.15;
            font-weight: 800;
            color: #241F18;
            letter-spacing: -0.02em;
            margin: 8px 0 0;
        }

        .content h2 {
            font-family: 'Hubot Sans', Arial, sans-serif;
            color: #241F18;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin: 28px 0 12px;
            line-height: 1.25;
        }

        .content h3 {
            font-family: 'Hubot Sans', Arial, sans-serif;
            color: #241F18;
            font-size: 16px;
            font-weight: 800;
            margin: 0 0 4px;
            line-height: 1.3;
        }

        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #3E362B;
            margin: 14px 0 0;
        }

        .content p.lead {
            margin-top: 14px;
        }

        /* ---------------- Button ---------------- */
        .button {
            display: inline-block;
            background-color: #F5623A !important;   /* coral-4 */
            color: #ffffff !important;
            font-family: 'Mona Sans', Arial, sans-serif !important;
            font-size: 16px !important;
            font-weight: 600 !important;
            letter-spacing: 0.01em !important;
            text-decoration: none !important;
            padding: 14px 26px !important;
            border-radius: 14px !important;
            line-height: 1.2 !important;
        }

        a.button:link,
        a.button:visited,
        a.button:hover,
        a.button:active { color: #ffffff !important; text-decoration: none !important; }

        .button:hover { background-color: #DB4A22 !important; } /* coral-5 */

        .button.secondary,
        .button-secondary {
            background-color: #ffffff !important;
            color: #3E362B !important;
            border: 1px solid #C7B79C !important;  /* border-strong / sand-4 */
        }

        .button.secondary:hover,
        .button-secondary:hover { background-color: #F4EEE3 !important; color: #241F18 !important; }

        /* ---------------- Inline link ---------------- */
        a { color: #B93A17; text-decoration: none; }   /* coral-6-ish link */

        .alt-link {
            font-size: 13px;
            line-height: 1.6;
            color: #82725B;
            margin: 22px 0 0;
        }
        .alt-link a { color: #B93A17; text-decoration: none; word-break: break-all; }

        /* ---------------- Boxes ---------------- */
        .note-box {
            display: block;
            margin: 22px 0 0;
            padding: 12px 14px;
            background: #F4EEE3;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            color: #5F5343;             /* sand-7 */
        }

        .info-box {
            background-color: #FBF8F3;   /* sand-0 */
            border: 1px solid #EAE1D2;
            border-radius: 14px;
            padding: 18px;
            margin: 22px 0 0;
        }

        .highlight-box {
            background: #FFF1EC;         /* coral-0 */
            border: 1px solid #FFD8C9;   /* coral-1 */
            border-radius: 14px;
            padding: 18px;
            margin: 22px 0 0;
        }
        .highlight-box h4 {
            font-family: 'Hubot Sans', Arial, sans-serif;
            color: #8F2C12;             /* coral-7 */
            margin: 0 0 10px;
            font-size: 15px;
            font-weight: 800;
        }
        .highlight-box ul { margin: 0; padding-left: 20px; color: #5F5343; }
        .highlight-box li { margin: 6px 0; font-size: 14px; line-height: 1.5; }

        .warning-box {
            background: #FFFBE0;         /* lemon-0 */
            border: 1px solid #FFF0A8;   /* lemon-1 */
            border-radius: 14px;
            padding: 14px 16px;
            margin: 22px 0 0;
        }
        .warning-box p { margin: 0; font-size: 14px; line-height: 1.5; color: #8F6B03; } /* lemon-6 */

        .url-box {
            background-color: #FBF8F3;
            border: 1px solid #EAE1D2;
            padding: 12px 14px;
            border-radius: 12px;
            word-break: break-all;
            font-family: 'Mona Sans Mono', 'SF Mono', Monaco, monospace;
            font-size: 13px;
            color: #5F5343;
            margin: 12px 0 0;
        }

        .mono { font-family: 'Mona Sans Mono', 'SF Mono', Monaco, monospace; }

        .divider {
            border: none;
            border-top: 1px solid #F4EEE3;
            margin: 22px 0;
        }

        .fine-print {
            font-size: 13px;
            line-height: 1.55;
            color: #A6957A;             /* text-subtle / sand-5 */
            margin: 18px 0 0;
        }

        /* ---------------- Footer ---------------- */
        .footer {
            padding: 24px 40px 28px;
            background: #FBF8F3;
            border-top: 1px solid #EFE7D9;
        }
        .footer-cols { width: 100%; border-collapse: collapse; }
        .footer-brand {
            font-family: 'Hubot Sans', Arial, sans-serif;
            font-weight: 800;
            font-size: 14px;
            color: #5F5343;
        }
        .footer-address {
            font-size: 12px;
            color: #A6957A;
            margin-top: 5px;
            line-height: 1.6;
        }
        .footer-links { text-align: right; font-size: 13px; }
        .footer-links a {
            color: #82725B;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 7px;
        }
        .footer-links a:last-child { margin-bottom: 0; }
        .footer-divider { height: 1px; background: #EFE7D9; margin: 16px 0 12px; }
        .footer-reason {
            font-size: 12px;
            color: #A6957A;
            margin: 0;
            line-height: 1.6;
        }
        .footer-reason a { color: #82725B; text-decoration: underline; }

        /* ---------------- Responsive ---------------- */
        @media (max-width: 600px) {
            .email-outer { padding: 0; }
            .email-container { border-radius: 0; border-left: none; border-right: none; }
            .header { padding: 28px 24px 20px; }
            .content { padding: 28px 24px 26px; }
            .footer { padding: 22px 24px 26px; }
            .button { display: block; text-align: center; }
            .footer-links { text-align: left; margin-top: 14px; }
        }
    </style>
</head>
<body>
    <div class="email-outer">
        <div class="email-container">
            {{EMAIL_CONTENT}}
        </div>
    </div>
</body>
</html>
