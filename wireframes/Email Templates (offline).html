document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"dc260760-a03f-4441-bebc-a73edd02f52e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet data-dc-atomics=\"\">\n<meta name=\"design_doc_mode\" content=\"canvas\">\n<style>/* JuggerHub webfonts — Mona Sans + Hubot Sans (open-source, from primer/brand).\n   Mona Sans = body & UI. Hubot Sans = expressive display. Mono for stats/tabular. */\n\n@font-face {\n  font-family: 'Mona Sans';\n  src: url(\"2746f8fc-2e63-48fd-8af3-1f43be5342a6\") format('woff2 supports variations'),\n       url(\"2746f8fc-2e63-48fd-8af3-1f43be5342a6\") format('woff2-variations');\n  font-weight: 200 900;\n  font-display: swap;\n  font-synthesis: none;\n  font-feature-settings: 'liga' 0;\n}\n\n@font-face {\n  font-family: 'Hubot Sans';\n  src: url(\"d997bb22-20b7-4012-8d04-4150c161b46c\") format('woff2 supports variations'),\n       url(\"d997bb22-20b7-4012-8d04-4150c161b46c\") format('woff2-variations');\n  font-weight: 200 900;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: 'Mona Sans Mono';\n  src: url(\"9826c714-b8b1-4960-b940-64615063725c\") format('woff2 supports variations'),\n       url(\"9826c714-b8b1-4960-b940-64615063725c\") format('woff2-variations');\n  font-weight: 200 900;\n  font-display: swap;\n  font-synthesis: none;\n}\n\n/* Metric-matched fallbacks to reduce layout shift before webfonts load */\n@font-face {\n  font-family: 'MonaSansFallback';\n  size-adjust: 104.5%;\n  ascent-override: 71%;\n  src: local(Arial);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   JuggerHub — COLOR TOKENS\n   Warm, welcoming, community. Sand neutrals + coral primary +\n   teal secondary + lemon highlight. Semantic aliases below.\n   ============================================================ */\n\n:root {\n  /* -- Neutral: warm sand scale (0 = lightest paper, 9 = ink) -- */\n  --sand-0: #FBF8F3;\n  --sand-1: #F4EEE3;\n  --sand-2: #EAE1D2;\n  --sand-3: #DBCEB9;\n  --sand-4: #C7B79C;\n  --sand-5: #A6957A;\n  --sand-6: #82725B;\n  --sand-7: #5F5343;\n  --sand-8: #3E362B;\n  --sand-9: #241F18;\n\n  --white: #FFFFFF;\n  --black: #1A160F;\n\n  /* -- Coral (primary): friendly, energetic warm accent -- */\n  --coral-0: #FFF1EC;\n  --coral-1: #FFD8C9;\n  --coral-2: #FFB69C;\n  --coral-3: #FF8E68;\n  --coral-4: #F5623A;\n  --coral-5: #DB4A22;\n  --coral-6: #B93A17;\n  --coral-7: #8F2C12;\n  --coral-8: #6A2210;\n  --coral-9: #401307;\n\n  /* -- Sage (secondary): muted, warm, low-contrast green.\n     Kept under the --teal-* names so components need no changes. -- */\n  --teal-0: #EEF3EF;\n  --teal-1: #DBE6DE;\n  --teal-2: #C1D3C6;\n  --teal-3: #9FBAA7;\n  --teal-4: #7A9B87;\n  --teal-5: #5F8070;\n  --teal-6: #4A6558;\n  --teal-7: #3B5145;\n  --teal-8: #2C3B33;\n  --teal-9: #1F2924;\n\n  /* -- Lemon (highlight): playful pops, badges, streaks -- */\n  --lemon-0: #FFFBE0;\n  --lemon-1: #FFF0A8;\n  --lemon-2: #FFE066;\n  --lemon-3: #F7CE33;\n  --lemon-4: #E0B211;\n  --lemon-5: #B88C05;\n  --lemon-6: #8F6B03;\n\n  /* -- Semantic hues -- */\n  --green-0: #E6F7ED;\n  --green-1: #A7E9C1;\n  --green-4: #1FA860;\n  --green-5: #16824A;\n  --green-6: #0F6438;\n\n  --red-0: #FFECEA;\n  --red-1: #FFC7C2;\n  --red-4: #F0463F;\n  --red-5: #CC2E28;\n  --red-6: #A11F1B;\n\n  --blue-0: #E9F1FF;\n  --blue-1: #BFD6FF;\n  --blue-4: #3B7DF0;\n  --blue-5: #2660CC;\n  --blue-6: #1B489C;\n\n  /* ==========================================================\n     SEMANTIC ALIASES — use these in components, not raw scales\n     ========================================================== */\n\n  /* Surfaces & backgrounds */\n  --surface-page: var(--sand-0);\n  --surface-raised: var(--white);\n  --surface-card: var(--white);\n  --surface-sunken: var(--sand-1);\n  --surface-muted: var(--sand-2);\n  --surface-inverse: var(--sand-9);\n  --surface-accent-soft: var(--coral-0);\n  --surface-secondary-soft: var(--teal-0);\n\n  /* Text */\n  --text-body: var(--sand-8);\n  --text-heading: var(--sand-9);\n  --text-muted: var(--sand-6);\n  --text-subtle: var(--sand-5);\n  --text-on-accent: var(--white);\n  --text-on-inverse: var(--sand-1);\n  --text-link: var(--coral-6);\n  --text-link-hover: var(--coral-7);\n\n  /* Brand */\n  --brand-primary: var(--coral-4);\n  --brand-primary-hover: var(--coral-5);\n  --brand-primary-active: var(--coral-6);\n  --brand-secondary: var(--teal-4);\n  --brand-secondary-hover: var(--teal-5);\n  --brand-highlight: var(--lemon-2);\n\n  /* Borders & dividers */\n  --border-default: var(--sand-3);\n  --border-muted: var(--sand-2);\n  --border-strong: var(--sand-4);\n  --border-accent: var(--coral-3);\n  --border-focus: var(--coral-4);\n\n  /* Feedback */\n  --success-fg: var(--green-6);\n  --success-bg: var(--green-0);\n  --success-border: var(--green-1);\n  --danger-fg: var(--red-6);\n  --danger-bg: var(--red-0);\n  --danger-border: var(--red-1);\n  --warning-fg: var(--lemon-6);\n  --warning-bg: var(--lemon-0);\n  --warning-border: var(--lemon-1);\n  --info-fg: var(--blue-6);\n  --info-bg: var(--blue-0);\n  --info-border: var(--blue-1);\n\n  /* Focus ring */\n  --focus-ring: 0 0 0 3px var(--coral-1);\n\n  /* Brand gradients — kept warm & gentle (coral-forward, soft sage) */\n  --brand-gradient: linear-gradient(105deg, var(--coral-4), var(--teal-4));\n  --brand-gradient-soft: linear-gradient(135deg, var(--coral-1), var(--teal-1));\n}\n<\u002Fstyle>\n<style>\nbody{margin:0;background:#EAE3D6;font-family:'Mona Sans','MonaSansFallback',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n.dv-turn{padding:44px 48px 40px;border-bottom:1px solid rgba(64,46,24,.10);scroll-margin-top:16px}\n.dv-thd{display:flex;align-items:baseline;gap:10px;margin:0 0 4px}\n.dv-tid{font:600 10px ui-monospace,Menlo,monospace;padding:3px 7px;background:#241F18;color:#fff;border-radius:4px;text-decoration:none}\n.dv-tname{font:600 13px/1.3 system-ui,sans-serif;color:#241F18}\n.dv-sys{max-width:820px;margin:12px 0 28px;padding:16px 20px;background:#FBF8F3;border:1px solid #EAE1D2;border-radius:16px;box-shadow:0 2px 6px rgba(64,46,24,.06)}\n.dv-sys h4{margin:0 0 6px;font:800 14px/1.3 'Hubot Sans',system-ui;color:#241F18;letter-spacing:-.01em}\n.dv-sys p{margin:0;font:13.5px/1.65 'Mona Sans',system-ui;color:#5F5343}\n.dv-sys b{color:#241F18;font-weight:700}\n.dv-chip{display:inline-block;font:600 11px/1 ui-monospace,Menlo,monospace;color:#B93A17;background:#FFF1EC;border:1px solid #FFD8C9;border-radius:5px;padding:2px 5px}\n.dv-opts{display:flex;flex-wrap:nowrap;width:max-content;gap:36px;align-items:flex-start}\n.dv-opt{flex:none;display:flex;flex-direction:column;gap:14px;scroll-margin-top:16px}\n.dv-oid{font:600 10.5px ui-monospace,Menlo,monospace;padding:3px 7px;background:rgba(64,46,24,.10);color:#241F18;border-radius:5px;text-decoration:none}\n.dv-olabel{display:flex;align-items:center;gap:9px;font:400 12.5px/1.3 system-ui,sans-serif;color:#6b5f4c}\n.dv-olabel b{color:#241F18;font-weight:700}\n.dv-opt:target .dv-oid{background:#F5623A;color:#fff}\n.dv-next{margin:28px 0 0;font:12.5px/1.7 system-ui,sans-serif;color:#6b5f4c}\n.dv-next a{color:#B93A17;text-decoration:none;font:600 11px ui-monospace,monospace;padding:1px 5px;background:rgba(245,98,58,.10);border-radius:4px}\n.dv-cap{font:600 9.5px ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;color:#A6957A;margin:0 0 6px}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section class=\"dv-turn\" id=\"t2\">\n<div class=\"dv-thd\"><a class=\"dv-tid\" href=\"#t2\">2<\u002Fa><span class=\"dv-tname\">Email templates — verification, invite, password reset &amp; team news<\u002Fspan><\u002Fdiv>\n<div class=\"dv-sys\">\n<h4>The base, applied four ways<\u002Fh4>\n<p>Centered wordmark header and structured footer are now the shared base — <b>identical across all four<\u002Fb>. Only the body block changes: verification, team invite, password reset, and team news. Notice the footer's \"why you're getting this\" line is tailored per email, and content leans on JuggerHub patterns (team card, avatars, mono for times &amp; counts). Fields in braces like <span class=\"dv-chip\">{team_name}<\u002Fspan> are merge tags.<\u002Fp>\n<\u002Fdiv>\n<div class=\"dv-opts\">\n\n<div class=\"dv-opt\" id=\"2a\" data-screen-label=\"2a Verification\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#2a\">2a<\u002Fa><b>Email verification<\u002Fb><\u002Fdiv>\n<div style=\"width:600px\">\n<p class=\"dv-cap\">In the inbox<\u002Fp>\n<div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;background:#FFFFFF;border:1px solid #EAE1D2;border-radius:16px;box-shadow:0 2px 6px rgba(64,46,24,.06)\">\n<div style=\"width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#F5623A,#7A9B87);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 64 64\" fill=\"none\" style=\"display:block\"><g stroke=\"#fff\" stroke-width=\"7\" stroke-linecap=\"round\"><line x1=\"20\" y1=\"20\" x2=\"44\" y2=\"44\"><\u002Fline><line x1=\"44\" y1=\"20\" x2=\"20\" y2=\"44\"><\u002Fline><\u002Fg><circle cx=\"32\" cy=\"32\" r=\"4.5\" fill=\"#FFE066\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n<div style=\"flex:1;min-width:0\">\n<div style=\"font-size:14px;color:#241F18\"><span style=\"font-weight:700\">JuggerHub<\u002Fspan> <span style=\"color:#A6957A\">&lt;hello@juggerhub.com&gt;<\u002Fspan><\u002Fdiv>\n<div style=\"font-family:'Hubot Sans',Arial,sans-serif;font-weight:700;font-size:15px;color:#241F18;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">Confirm your email to finish signing up<\u002Fdiv>\n<div style=\"font-size:13px;color:#82725B;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">One quick tap and you're in — the link expires in 24 hours.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"width:600px\">\n<p class=\"dv-cap\">Opened<\u002Fp>\n<div style=\"background:#F4EEE3;border:1px solid #E3D9C7;border-radius:22px;padding:24px\">\n<div style=\"max-width:552px;margin:0 auto;background:#FFFFFF;border:1px solid #EAE1D2;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(64,46,24,.10)\">\n<div style=\"padding:32px 40px 24px;text-align:center;border-bottom:1px solid #F4EEE3\"><div style=\"display:inline-flex;align-items:center;gap:10px\"><div style=\"width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#F5623A,#7A9B87);display:inline-flex;align-items:center;justify-content:center\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 64 64\" fill=\"none\" style=\"display:block\"><g stroke=\"#fff\" stroke-width=\"7\" stroke-linecap=\"round\"><line x1=\"20\" y1=\"20\" x2=\"44\" y2=\"44\"><\u002Fline><line x1=\"44\" y1=\"20\" x2=\"20\" y2=\"44\"><\u002Fline><\u002Fg><circle cx=\"32\" cy=\"32\" r=\"4.5\" fill=\"#FFE066\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><span style=\"font-family:'Hubot Sans',Arial,sans-serif;font-weight:800;font-size:21px;color:#241F18;letter-spacing:-.02em\">JuggerHub<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div style=\"padding:34px 40px 30px\">\n<div style=\"font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#82725B\">Confirm your email<\u002Fdiv>\n<h1 style=\"font-family:'Hubot Sans',Arial,sans-serif;font-size:27px;line-height:1.15;font-weight:800;color:#241F18;letter-spacing:-.02em;margin:8px 0 0\">Almost there, {first_name}.<\u002Fh1>\n<p style=\"font-size:16px;line-height:1.6;color:#3E362B;margin:14px 0 0\">Welcome to JuggerHub! Confirm your email address and you'll be ready to find teams near you, book training, and follow your matches.<\u002Fp>\n<div style=\"margin:26px 0 4px\"><a href=\"#\" style=\"display:inline-block;background:#F5623A;color:#FFFFFF;font-family:'Mona Sans',Arial,sans-serif;font-size:16px;font-weight:600;letter-spacing:.01em;text-decoration:none;padding:14px 26px;border-radius:14px\">Confirm my email<\u002Fa><\u002Fdiv>\n<p style=\"font-size:13px;line-height:1.6;color:#82725B;margin:22px 0 0\">Button not working? Paste this link into your browser:<br><a href=\"#\" style=\"color:#B93A17;text-decoration:none;word-break:break-all\">https://juggerhub.com/verify?token={token}<\u002Fa><\u002Fp>\n<div style=\"height:1px;background:#F4EEE3;margin:22px 0\"><\u002Fdiv>\n<p style=\"font-size:13px;line-height:1.55;color:#A6957A;margin:0\">This link expires in 24 hours. Didn't sign up for JuggerHub? You can safely ignore this email — no account will be created.<\u002Fp>\n<\u002Fdiv>\n<div style=\"padding:24px 40px 28px;background:#FBF8F3;border-top:1px solid #EFE7D9\">\n<div style=\"display:table;width:100%\"><div style=\"display:table-cell;vertical-align:top\"><div style=\"font-family:'Hubot Sans',Arial,sans-serif;font-weight:800;font-size:14px;color:#5F5343\">JuggerHub<\u002Fdiv><div style=\"font-size:12px;color:#A6957A;margin-top:5px;line-height:1.6\">JuggerHub e.V. · Tempelhofer Feld 1<br>12101 Berlin, Germany<\u002Fdiv><\u002Fdiv><div style=\"display:table-cell;vertical-align:top;text-align:right;font-size:13px\"><a href=\"#\" style=\"color:#82725B;text-decoration:none;display:inline-block;margin-bottom:7px\">Help center<\u002Fa><br><a href=\"#\" style=\"color:#82725B;text-decoration:none;display:inline-block;margin-bottom:7px\">Manage notifications<\u002Fa><br><a href=\"#\" style=\"color:#82725B;text-decoration:none;display:inline-block\">Unsubscribe<\u002Fa><\u002Fdiv><\u002Fdiv>\n<div style=\"height:1px;background:#EFE7D9;margin:16px 0 12px\"><\u002Fdiv>\n<p style=\"font-size:12px;color:#A6957A;margin:0;line-height:1.6\">You're getting this because someone signed up for JuggerHub with this email address.<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"dv-opt\" id=\"2b\" data-screen-label=\"2b Team invite\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#2b\">2b<\u002Fa><b>Team invite
