  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

g,#e4ddd0,#e4ddd0 4px,#dcd4c6 4px,#dcd4c6 8px)}\n.wf-avstack .wf-mini-av:first-child{margin-left:0}\n.wf-avmore{width:24px;height:24px;border-radius:50%;border:2px solid var(--card);background:#eee7db;display:flex;align-items:center;justify-content:center;font:9px ui-monospace;color:var(--soft);margin-left:-8px;flex:none}\n.wf-sess{display:flex;gap:10px;align-items:center;padding:10px;border:1.4px solid var(--line);border-radius:11px;background:#fff}\n.wf-count{display:inline-flex;align-items:center;gap:4px;font:12px 'Patrick Hand';color:var(--soft)}\n.wf-cdot{width:8px;height:8px;border-radius:50%;flex:none}\n.wf-switch{width:40px;height:23px;border-radius:12px;border:1.7px solid var(--soft);background:#fff;position:relative;flex:none}\n.wf-switch-knob{position:absolute;top:2.5px;left:2.5px;width:15px;height:15px;border-radius:50%;background:var(--soft)}\n.wf-switch-on{border-color:var(--green);background:#e2efe7}\n.wf-switch-on .wf-switch-knob{left:auto;right:2.5px;background:var(--green)}\n.wf-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}\n.wf-calh{font:8px ui-monospace;letter-spacing:.04em;text-transform:uppercase;color:var(--soft);text-align:center}\n.wf-cald{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font:12px ui-monospace;color:var(--ink);background:#faf7f2;border:1px solid var(--line)}\n.wf-cald-off{color:#c9c2b6;background:transparent;border-color:transparent}\n.wf-cald-tr{border-color:var(--blue);background:rgba(47,111,208,.12);color:var(--blue)}\n.wf-cald-skip{border-color:var(--red);background:#fbefee;color:var(--red);text-decoration:line-through}\n.wf-choice{display:flex;gap:11px;align-items:center;border:1.7px solid var(--line);border-radius:12px;padding:13px 12px;background:#fff}\n.wf-choicek{width:38px;height:38px;border-radius:10px;border:1.6px solid var(--ink);display:flex;align-items:center;justify-content:center;font:17px 'Patrick Hand';color:var(--ink);flex:none}\n.wf-cancelbar{display:flex;align-items:center;gap:8px;justify-content:center;background:var(--red);color:#fff;font:11px 'Patrick Hand';padding:6px;border-radius:9px 9px 0 0}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<section class=\"dv-turn\" id=\"t8\">\n<div class=\"dv-thd\"><a class=\"dv-tid\" href=\"#t8\">8<\u002Fa><span class=\"dv-tname\">Trainings — team-scoped recurring events · Trainings tab + dashboard agenda · create (series / one-off) · session page &amp; three-way RSVP · edit this-vs-series · public &amp; open to outsiders<\u002Fspan><\u002Fdiv>\n\n<div class=\"wf-legend\">\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>Trainings live inside a team<\u002Fb> — the <b>Trainings tab<\u002Fb> on the team page (Team, turn 3, where it was greyed “next”). They behave like <b>internal recurring events<\u002Fb>: no fee, no cap, just show-up.<\u002Fspan><\u002Fdiv>\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>A training is a series or a one-off.<\u002Fb> A <b>series<\u002Fb> has a day, time, location, an <b>interval<\u002Fb> (weekly / every 2 weeks / monthly) and an <b>end date<\u002Fb> — it spawns individual <b>sessions<\u002Fb>. A <b>one-off<\u002Fb> is a single session (<a class=\"dv-oid\" href=\"#8b\">8b<\u002Fa>).<\u002Fspan><\u002Fdiv>\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>Players respond per session<\u002Fb> — <b style=\"color:#2f6647\">Going<\u002Fb> · <b style=\"color:#8a5e16\">Maybe<\u002Fb> · <b style=\"color:#8f2f2f\">Can’t<\u002Fb>. No limit; everyone’s welcome. Members see who’s coming (<a class=\"dv-oid\" href=\"#8c\">8c<\u002Fa>).<\u002Fspan><\u002Fdiv>\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>Editing forks:<\u002Fb> change <b>this one session<\u002Fb> or <b>the whole series<\u002Fb>. A single edited session <b>detaches<\u002Fb> and keeps its own values; whole-series edits skip it. You can also <b>skip or cancel<\u002Fb> a single date (<a class=\"dv-oid\" href=\"#8d\">8d<\u002Fa>).<\u002Fspan><\u002Fdiv>\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>Public opens the doors.<\u002Fb> Mark a <b>whole series or a single session<\u002Fb> public and anyone — not just the team — can view it and <b>RSVP openly<\u002Fb>. Outsiders show as <b>guests<\u002Fb> the admin can remove (<a class=\"dv-oid\" href=\"#8e\">8e<\u002Fa>).<\u002Fspan><\u002Fdiv>\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>Second home:<\u002Fb> a <b>“your trainings” agenda<\u002Fb> on the dashboard surfaces your next sessions across teams (<a class=\"dv-oid\" href=\"#8a\">8a<\u002Fa>).<\u002Fspan><\u002Fdiv>\n<div class=\"wf-li\"><span class=\"wf-key\">◆<\u002Fspan><span><b>Viewpoints:<\u002Fb> the <b>member<\u002Fb> (responds) &amp; the <b>team admin<\u002Fb> (creates, edits, manages) — plus the <b>outsider<\u002Fb> on a public session. Shown for <b>Rheinfeuer<\u002Fb>, a Köln city team.<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"dv-opts\">\n\n<!-- ============ 8a — Trainings tab + dashboard agenda ============ -->\n<div class=\"dv-opt\" id=\"8a\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#8a\">8a<\u002Fa> The Trainings tab (member + admin) · empty state · dashboard agenda<\u002Fdiv>\n<div class=\"dv-card\">\n<div class=\"wf-dirhd\"><p class=\"wf-dirname\">Where trainings live<\u002Fp><p class=\"wf-dirdesc\">The team page’s fourth tab, now filled in. Upcoming sessions as a dated list — each shows its series or one-off badge, the going count, and the member’s own RSVP inline. The admin sees the same list plus <b>+ New training<\u002Fb> and the active series. When there’s nothing yet, an empty state points the way. And on the home dashboard, a <b>your trainings<\u002Fb> agenda pulls your next sessions forward.<\u002Fp><\u002Fdiv>\n<div class=\"wf-strip\">\n\n<!-- Member view -->\n<div class=\"wf-cell\">\n<div class=\"wf-phone\" data-screen-label=\"8a Trainings tab member\"><div class=\"wf-notch\"><\u002Fdiv><div class=\"wf-screen\"><div class=\"wf-pad\" style=\"gap:11px\">\n<div class=\"wf-row\" style=\"gap:10px\"><div class=\"wf-tlogo sm\">R<\u002Fdiv><div class=\"wf-col\" style=\"gap:2px;flex:1\"><span class=\"wf-name\" style=\"font-size:16px\">Rheinfeuer<\u002Fspan><span class=\"wf-cap\" style=\"font-size:11px\"><span class=\"wf-pin\"><\u002Fspan> Köln · 9 members<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"wf-tabs\"><span class=\"wf-tab\">Members<\u002Fspan><span class=\"wf-tab\">Activity<\u002Fspan><span class=\"wf-tab\">News<\u002Fspan><span class=\"wf-tab wf-tab-on\">Trainings<\u002Fspan><\u002Fdiv>\n<span class=\"wf-label\">Next up<\u002Fspan>\n<div class=\"wf-sess\" style=\"border-color:var(--ink);align-items:flex-start\">\n<div class=\"wf-datebox\"><span class=\"wf-dbm\">Tue<\u002Fspan><span class=\"wf-dbd\">19<\u002Fspan><\u002Fdiv>\n<div class=\"wf-col\" style=\"gap:6px;flex:1\">\n<div class=\"wf-row\" style=\"gap:6px;justify-content:space-between\"><span class=\"wf-mname\" style=\"font-size:15px\">Tuesday Training<\u002Fspan><span class=\"wf-seriesbadge\">↻ Series<\u002Fspan><\u002Fdiv>\n<span class=\"wf-cap\" style=\"font-size:11px\">19:00–21:00 · <span class=\"wf-pin\"><\u002Fspan> Sportpark<\u002Fspan>\n<div class=\"wf-row\" style=\"justify-content:space-between\"><span class=\"wf-count\"><span class=\"wf-cdot\" style=\"background:var(--green)\"><\u002Fspan><span class=\"wf-mono\">6<\u002Fspan> going<\u002Fspan><span class=\"wf-st wf-st-go\">You’re going<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<span class=\"wf-label\">Later<\u002Fspan>\n<div class=\"wf-col\" style=\"gap:8px\">\n<div class=\"wf-sess\">\n<div class=\"wf-datebox\"><span class=\"wf-dbm\">Sat<\u002Fspan><span class=\"wf-dbd\">23<\u002Fspan><\u002Fdiv>\n<div class=\"wf-col\" style=\"gap:3px;flex:1\"><div class=\"wf-row\" style=\"gap:6px\"><span class=\"wf-mname\" style=\"font-size:14px\">Extra scrimmage<\u002Fspan><span class=\"wf-oneoffbadge\">One-off<\u002Fspan><\u002Fdiv><span class=\"wf-c button>\n<span class=\"wf-label\">Active series · 1<\u002Fspan>\n<div class=\"wf-sess\" style=\"align-items:flex-start\">\n<div class=\"wf-tlogo sm\" style=\"border-style:solid;border-color:var(--blue);color:var(--blue)\">↻<\u002Fdiv>\n<div class=\"wf-col\" style=\"gap:3px;flex:1\"><div class=\"wf-row\" style=\"gap:6px;justify-content:space-between\"><span class=\"wf-mname\" style=\"font-size:14px\">Tuesday Training<\u002Fspan><span class=\"wf-dots\">⋯<\u002Fspan><\u002Fdiv><span class=\"wf-cap\" style=\"font-size:11px\">Every Tue 19:00 · until 16 Dec · ~9 left<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<span class=\"wf-label\">Upcoming sessions<\u002Fspan>\n<div class=\"wf-col\" style=\"gap:8px\">\n<div class=\"wf-sess\">\n<div class=\"wf-datebox\"><span class=\"wf-dbm\">Tue<\u002Fspan><span class=\"wf-dbd\">19<\u002Fspan><\u002Fdiv>\n<div class=\"wf-col\" style=\"gap:3px;flex:1\"><span class=\"wf-mname\" style=\"font-size:14px\">Tuesday Training<\u002Fspan><span class=\"wf-cap\" style=\"font-size:11px\"><span class=\"wf-mono\">6<\u002Fspan> going · <span class=\"wf-mono\">2<\u002Fspan> maybe · <span class=\"wf-mono\">1<\u002Fspan> out<\u002Fspan><\u002Fdiv>\n<span class=\"wf-dots\">⋯<\u002Fspan>\n<\u002Fdiv>\n<div class=\"wf-sess\">\n<div class=\"wf-datebox\"><span class=\"wf-dbm\">Sat<\u002Fspan><span class=\"wf-dbd\">23<\u002Fspan><\u002Fdiv>\n<div class=\"wf-col\" style=\"gap:3px;flex:1\"><div class=\"wf-row\" style=\"gap:5px\"><span class=\"wf-mname\" style=\"font-size:14px\">Extra scrimmage<\u002Fspan><span class=\"wf-oneoffbadge\">One-off<\u002Fspan><\u002Fdiv><span class=\"wf-cap\" style=\"font-size:11px\"><span class=\"wf-mono\">4<\u002Fspan> going · <span class=\"wf-mono\">1<\u002Fspan> maybe<\u002Fspan><\u002Fdiv>\n<span class=\"wf-dots\">⋯<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n<p class=\"wf-note\" style=\"margin-top:auto\">⋯ on a series edits all upcoming; ⋯ on a session edits just that one (<a class=\"dv-oid\" href=\"#8d\">8d<\u002Fa>).<\u002Fp>\n<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"wf-scap\">Admin — + new, active series &amp; sessions<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Empty state -->\n<div class=\"wf-cell\">\n<div class=\"wf-phone\" data-screen-label=\"8a Empty state\"><div class=\"wf-notch\"><\u002Fdiv><div class=\"wf-screen\"><div class=\"wf-pad\" style=\"gap:11px\">\n<div class=\"wf-row\" style=\"gap:10px\"><div class=\"wf-tlogo sm\">R<\u002Fdiv><div class=\"wf-col\" style=\"gap:2px;flex:1\"><span class=\"wf-name\" style=\"font-size:16px\">Rheinfeuer<\u002Fspan><span class=\"wf-cap\" style=\"font-size:11px\"><span class=\"wf-pin\"><\u002Fspan> Köln · 9 members<\u002Fspan><\u002Fdiv><\u002Fdiv>\n<div class=\"wf-tabs\"><span class=\"wf-tab\">Members<\u002Fspan><span class=\"wf-tab\">Activity<\u002Fspan><span class=\"wf-tab\">News<\u002Fspan><span class=\"wf-tab wf-tab-on\">Trainings<\u002Fspan><\u002Fdiv>\n<div class=\"wf-col\" style=\"align-items:center;text-align:center;gap:12px;margin:auto 0;padding:20px 6px\">\n<div class=\"wf-tlogo\" style=\"width:56px;height:56px;border-radius:16px;font-size:20px;color:var(--soft)\">↻<\u002Fdiv>\n<div class=\"wf-col\" style=\"gap:6px;align-items:center\"><span class=\"wf-q\" style=\"font-size:19px\">No trainings yet<\u002Fspan><span class=\"wf-sub\" style=\"max-width:210px\">Set a weekly session or a one-off — players get a spot to say if they’re in.<\u002Fspan><\u002Fdiv>\n<button class=\"wf-btn wf-btn-blue\">+ Set up a training<\u002Fbutton>\n<span class=\"wf-cap\" style=\"font-size:11px\">Admins only · members will see sessions here<\u002Fspan>\n<\u002Fdiv>\n<p class=\"wf-note\" style=\"margin-top:auto\">Members see a gentle “nothing scheduled” — no create button.<\u002Fp>\n<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"wf-scap\">Empty — admin prompt to start<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Dashboard agenda -->\n<div class=\"wf-cell\">\n<div class=\"wf-phone\" data-screen-label=\"8a Dashboard agenda\"><div class=\"wf-notch\"><\u002Fdiv><div class=\"wf-screen\"><di
