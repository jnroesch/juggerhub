<!-- Bottom sheet on mobile, centered dialog on desktop. Host renders this while open. -->
<div class="fixed inset-0 z-50 flex items-end justify-center bg-black/40 p-0 sm:items-center sm:p-md" role="presentation">
  <div
    class="flex max-h-[90vh] w-full max-w-container-sm flex-col overflow-hidden rounded-t-xl bg-surface-card shadow-xl sm:rounded-xl"
    role="dialog"
    aria-modal="true"
    aria-label="Grant a badge or achievement"
    data-testid="assign-modal"
  >
    <div class="flex items-center justify-between border-b border-border-muted px-md py-sm">
      <h3 class="text-body-lg font-semibold text-heading">Grant to {{ subjectLabel() }}</h3>
      <button type="button" (click)="close()" class="text-muted hover:text-body" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-5 w-5"><path d="M18 6 6 18M6 6l12 12" /></svg>
      </button>
    </div>

    <div class="border-b border-border-muted px-md pt-sm">
      <div class="inline-flex gap-xs">
        <button
          type="button"
          class="rounded-t-md px-md py-xs text-body-sm font-medium"
          [class.bg-brand]="tab() === 'badge'"
          [class.text-on-accent]="tab() === 'badge'"
          [class.text-muted]="tab() !== 'badge'"
          (click)="switchTab('badge')"
        >
          Badges
        </button>
        <button
          type="button"
          class="rounded-t-md px-md py-xs text-body-sm font-medium"
          [class.bg-brand]="tab() === 'achievement'"
          [class.text-on-accent]="tab() === 'achievement'"
          [class.text-muted]="tab() !== 'achievement'"
          (click)="switchTab('achievement')"
        >
          Achievements
        </button>
      </div>
    </div>

    <div class="min-h-0 flex-1 overflow-y-auto p-md">
      @if (pickerItems().length === 0) {
        <p class="text-body-sm text-faint">Nothing in the catalogue applies here yet.</p>
      } @else {
        <ul class="grid grid-cols-2 gap-sm sm:grid-cols-3">
          @for (d of pickerItems(); track d.id) {
            <li>
              <button
                type="button"
                (click)="select(d.id)"
                [disabled]="isHeld(d.id)"
                [attr.data-testid]="'pick-' + d.id"
                class="flex w-full flex-col items-center gap-xs rounded-md border p-sm text-center transition-colors"
                [class.border-border-focus]="selectedDefId() === d.id"
                [class.ring-2]="selectedDefId() === d.id"
                [class.ring-focus]="selectedDefId() === d.id"
                [class.border-border-muted]="selectedDefId() !== d.id"
                [class.opacity-60]="isHeld(d.id)"
              >
                <span class="grid h-11 w-11 place-items-center overflow-hidden rounded-full border border-border-strong bg-surface-subtle text-muted">
                  @if (d.hasIcon) {
                    <img [src]="iconUrl(tab(), d.id)" [alt]="d.name" class="h-full w-full object-cover" />
                  } @else {
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-5 w-5"><circle cx="12" cy="8" r="5" /><path d="M8.5 12.5 7 22l5-3 5 3-1.5-9.5" /></svg>
                  }
                </span>
                <span class="block w-full truncate text-body-sm font-medium text-heading">{{ d.name }}</span>
                @if (isHeld(d.id)) {
                  <span class="text-caption font-semibold text-success-fg">Given</span>
                }
              </button>
            </li>
          }
        </ul>
      }

      @if (tab() === 'achievement' && selectedDefId()) {
        <div class="mt-md grid grid-cols-2 gap-sm">
          <label class="block">
            <span class="text-caption font-medium text-muted">Year (optional)</span>
            <input type="number" [ngModel]="contextYear()" (ngModelChange)="contextYear.set($event)" placeholder="2026"
              class="mt-xs h-10 w-full rounded-md border border-border-strong bg-surface-card px-sm text-body-sm" />
          </label>
          <label class="block">
            <span class="text-caption font-medium text-muted">Label (optional)</span>
            <input type="text" [ngModel]="contextLabel()" (ngModelChange)="contextLabel.set($event)" placeholder="National championship"
              class="mt-xs h-10 w-full rounded-md border border-border-strong bg-surface-card px-sm text-body-sm" />
          </label>
        </div>
      }

      <label class="mt-md block">
        <span class="text-caption font-medium text-muted">Note (optional) — shows in the admin log</span>
        <input
          type="text"
          [ngModel]="note()"
          (ngModelChange)="note.set($event)"
          placeholder="Why are they getting this?"
          data-testid="grant-note"
          class="mt-xs h-10 w-full rounded-md border border-border-strong bg-surface-card px-sm text-body-sm"
        />
      </label>

      @if (grantError()) {
        <p class="mt-sm text-body-sm text-danger-fg" role="alert">{{ grantError() }}</p>
      }
    </div>

    <div class="flex items-center justify-end gap-sm border-t border-border-muted px-md py-sm">
      <button type="button" (click)="close()" jhButton variant="secondary" size="sm">
        Cancel
      </button>
      <button
        type="button"
        (click)="grant()"
        [disabled]="!selectedDefId() || granting()"
        data-testid="grant-submit"
        jhButton size="sm"
      >
        {{ granting() ? 'Granting…' : 'Grant' }}
      </button>
    </div>
  </div>
</div>
