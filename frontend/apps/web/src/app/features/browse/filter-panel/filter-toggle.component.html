<div class="flex items-center justify-between gap-sm">
  <span class="flex flex-col">
    <span class="text-body-sm text-ink">{{ label() }}</span>
    @if (hint()) {
      <span class="text-caption text-faint">{{ hint() }}</span>
    }
  </span>
  <button
    type="button"
    role="switch"
    [attr.aria-checked]="checked()"
    [attr.aria-label]="label()"
    class="relative inline-flex h-6 w-10 shrink-0 items-center rounded-full border transition-colors duration-fast"
    [class.bg-brand]="checked()"
    [class.border-brand]="checked()"
    [class.bg-surface-sunken]="!checked()"
    [class.border-border]="!checked()"
    (click)="toggled.emit(!checked())"
  >
    <span
      class="inline-block h-4 w-4 rounded-full bg-surface-card shadow-coral transition-transform duration-fast"
      [class.translate-x-4]="checked()"
      [class.translate-x-1]="!checked()"
    ></span>
  </button>
</div>
