<section class="mx-auto max-w-container-md px-md py-lg" data-testid="profile-public-page">
  @if (loading()) {
    <jh-loading />
  } @else if (notFound()) {
    <jh-card accent class="mx-auto mt-2xl max-w-md p-xl text-center" data-testid="profile-notfound">
      <h1 class="text-heading-md text-ink">Profile not found</h1>
      <p class="mt-sm text-body-md text-text-muted">This link doesn't point to a player profile.</p>
      <a routerLink="/" class="mt-lg inline-block text-body-md font-medium text-link hover:text-link-hover">Go to JuggerHub</a>
    </jh-card>
  } @else if (view(); as v) {
    <div data-testid="profile-public">
      <!-- Quick actions (feature 021) — signed-in, non-self viewers only. Renders nothing otherwise. -->
      <jh-profile-quick-actions [handle]="v.handle" class="mb-lg block" />

      <jh-profile-view [profile]="v" />
    </div>
  }
</section>
