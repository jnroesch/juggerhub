<section data-testid="contacts-list">
  <h2 class="text-eyebrow font-semibold uppercase tracking-[0.06em] text-muted">Contacts</h2>
  @if (contacts().length === 0) {
    <p class="mt-xs text-body-sm text-faint">No contacts listed.</p>
  } @else {
    <ul class="mt-xs space-y-sm">
      @for (c of contacts(); track c.id) {
        <li class="text-body-sm">
          <p class="font-semibold text-body">{{ c.name }} <span class="font-normal text-subtle">· {{ c.role }}</span></p>
          @if (c.email) { <a [href]="'mailto:' + c.email" class="text-brand">{{ c.email }}</a> }
          @if (c.phone) { <span class="text-subtle"> {{ c.phone }}</span> }
        </li>
      }
    </ul>
  }
</section>
