<div class="p-md sm:p-xl">
  <div class="mx-auto w-full max-w-3xl">
    <header>
      <h1 class="text-heading-lg font-semibold text-ink">Dashboard</h1>
      <p class="mt-xs text-body-sm text-subtle">
        JuggerHub walking skeleton — live system health
      </p>
    </header>

    <section
      class="relative mt-xl overflow-hidden rounded-lg border border-border-muted bg-surface-card p-xl shadow-sm transition-shadow duration-base hover:shadow-md"
      data-testid="health-card"
    >
      <span class="absolute inset-x-0 top-0 h-1 bg-brand-gradient" aria-hidden="true"></span>
      @if (loading()) {
        <p class="text-body-md text-subtle" data-testid="health-loading">
          Checking system health…
        </p>
      } @else if (failed() || !health()) {
        <p class="text-body-md text-danger" data-testid="health-error">
          Unable to reach the backend.
        </p>
      } @else {
        <div class="flex items-center gap-sm">
          <span
            class="inline-block h-3 w-3 shrink-0 rounded-full"
            [class.bg-success]="health()!.status === 'healthy'"
            [class.bg-danger]="health()!.status !== 'healthy'"
            aria-hidden="true"
          ></span>
          <span
            class="text-heading-md font-semibold capitalize text-ink"
            data-testid="health-status"
          >
            {{ health()!.status }}
          </span>
        </div>

        <dl class="mt-md grid grid-cols-1 gap-md sm:grid-cols-2">
          <div>
            <dt class="text-body-sm text-subtle">Database</dt>
            <dd class="text-body-md capitalize text-text" data-testid="health-database">
              {{ health()!.database }}
            </dd>
          </div>
          <div>
            <dt class="text-body-sm text-subtle">API version</dt>
            <dd class="font-mono text-body-md text-text">{{ health()!.version }}</dd>
          </div>
        </dl>
      }
    </section>
  </div>
</div>
