<section class="mx-auto max-w-container-md px-md py-lg">
  <h1 class="text-h3 text-heading">News</h1>
  <p class="mt-xs text-body-sm text-muted">Updates from your teams and the events you're part of.</p>

  @if (items().length > 0) {
    <div class="mt-lg rounded-lg border border-border-muted bg-surface-card p-md shadow-sm">
      <jh-news-list [news]="items()" />
    </div>
  } @else if (!loading() && !failed()) {
    <p class="mt-lg rounded-lg bg-surface-sunken px-md py-2xl text-center text-body-sm text-muted">No news yet.</p>
  }

  @if (failed()) {
    <div class="mt-lg text-center">
      <p class="text-body-sm text-muted">We couldn't load the feed.</p>
      <button type="button" class="mt-sm rounded-md border border-border-strong bg-surface px-lg py-xs font-medium text-text hover:bg-surface-sunken" (click)="loadMore()">Try again</button>
    </div>
  } @else if (loading()) {
    <jh-loading align="center" />
  } @else if (hasMore()) {
    <div class="mt-md text-center">
      <button type="button" class="rounded-md border border-border-strong bg-surface px-lg py-xs font-medium text-text hover:bg-surface-sunken" (click)="loadMore()">Load more</button>
    </div>
  }
</section>
