<ul class="flex flex-col gap-sm" data-testid="news-list">
  @for (item of news(); track $index) {
    <li>
      <a [routerLink]="link(item)" class="flex items-start gap-sm rounded-md px-xs py-xs transition-colors duration-fast hover:bg-surface-sunken">
        <span
          class="mt-0.5 shrink-0 rounded-pill px-xs py-0.5 text-eyebrow font-semibold uppercase"
          [class]="pillClass(item)"
        >
          {{ item.source }}
        </span>
        <span class="min-w-0 flex-1">
          <span class="block text-body-sm text-body">{{ item.body }}</span>
          <span class="block text-caption text-subtle">{{ item.sourceName }} · {{ rel(item.createdDate) }}</span>
        </span>
      </a>
    </li>
  }
</ul>
