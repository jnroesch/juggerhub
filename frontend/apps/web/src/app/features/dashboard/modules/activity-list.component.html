@if (hasAny()) {
  <jh-card class="p-md" data-testid="activity">
    <h2 class="mb-sm text-body-sm font-semibold uppercase tracking-wide text-subtle">What's going on</h2>
    <ul class="flex flex-col gap-xs">
      @for (item of items(); track $index) {
        <li class="flex items-baseline gap-sm" [attr.data-kind]="item.kind">
          <span class="min-w-0 flex-1 text-body-sm text-muted">
            @if (link(item); as route) {
              <a [routerLink]="route" class="hover:text-link">{{ item.summary }}</a>
            } @else {
              {{ item.summary }}
            }
          </span>
          <span class="shrink-0 text-caption text-subtle">{{ rel(item.occurredAt) }}</span>
        </li>
      }
    </ul>
  </jh-card>
}
