@if (policy()) {
  <ul class="mt-sm space-y-xs text-body-sm" data-testid="password-rules">
    @for (rule of rules(); track rule.label) {
      <li
        class="flex items-center gap-xs"
        [class.text-success]="rule.met"
        [class.text-subtle]="!rule.met"
      >
        <span class="inline-grid h-4 w-4 place-items-center" aria-hidden="true">
          {{ rule.met ? '✓' : '○' }}
        </span>
        <span>{{ rule.label }}</span>
      </li>
    }
  </ul>
}
