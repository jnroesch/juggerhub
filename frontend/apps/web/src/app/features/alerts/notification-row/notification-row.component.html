<article
  class="flex gap-md rounded-lg border border-border-muted bg-surface-card p-md shadow-sm transition-colors duration-fast"
  [class.opacity-80]="notification().isRead"
  [attr.aria-label]="title()"
>
  <!-- Type icon -->
  <span
    class="grid h-11 w-11 shrink-0 place-items-center rounded-md"
    [class]="
      kind() === 'TeamInvite'
        ? 'bg-surface-accent-soft text-brand-active'
        : kind() === 'TeamRoleChanged'
          ? 'bg-info-bg text-info-fg'
          : 'bg-surface-secondary-soft text-secondary'
    "
    aria-hidden="true"
  >
    @switch (kind()) {
      @case ('TeamInvite') {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      }
      @case ('TeamRoleChanged') {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z"/><path d="m9 12 2 2 4-4"/></svg>
      }
      @default {
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11v2a1 1 0 0 0 1 1h3l5 4V6L7 10H4a1 1 0 0 0-1 1Z"/><path d="M16 9a3 3 0 0 1 0 6"/></svg>
      }
    }
  </span>

  <!-- Body -->
  <div class="min-w-0 flex-1">
    @if (link(); as href) {
      <a
        [routerLink]="href"
        (click)="open.emit()"
        class="block rounded-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-focus"
      >
        <p class="text-body-sm font-semibold text-heading">{{ title() }}</p>
        <p class="mt-0.5 truncate text-body-sm text-muted">{{ supporting() }}</p>
      </a>
    } @else {
      <p class="text-body-sm font-semibold text-heading">{{ title() }}</p>
      <p class="mt-0.5 text-body-sm text-muted">{{ supporting() }}</p>
    }

    <p class="mt-1 text-caption text-subtle">{{ time() }}</p>

    @if (actionable()) {
      <div class="mt-md flex items-center gap-sm">
        <button
          type="button"
          (click)="accept.emit()"
          jhButton size="sm"
          data-testid="notif-accept"
        >
          Accept
        </button>
        <button
          type="button"
          (click)="decline.emit()"
          class="rounded-pill border border-border px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-focus"
          data-testid="notif-decline"
        >
          Decline
        </button>
      </div>
    }
  </div>

  <!-- Unread marker -->
  @if (!notification().isRead) {
    <span class="mt-1.5 h-2.5 w-2.5 shrink-0 rounded-pill bg-brand" aria-label="Unread"></span>
  }
</article>
