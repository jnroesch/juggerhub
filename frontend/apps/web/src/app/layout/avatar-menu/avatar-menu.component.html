<div class="relative">
  <button
    type="button"
    class="grid h-9 w-9 place-items-center rounded-pill bg-surface-inverse text-body-sm font-semibold text-on-inverse transition-shadow duration-fast hover:shadow-sm focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-focus"
    [attr.aria-expanded]="open()"
    aria-haspopup="menu"
    aria-label="Account menu"
    data-testid="avatar-menu-button"
    (click)="toggle()"
  >
    {{ initial() }}
  </button>

  @if (open()) {
    <div
      class="absolute right-0 z-50 mt-2 w-52 overflow-hidden rounded-md border border-border bg-surface py-xs shadow-md"
      role="menu"
      aria-label="Account"
      data-testid="avatar-menu"
    >
      @if (user(); as currentUser) {
        <p class="truncate px-md py-xs text-caption text-subtle" data-testid="avatar-menu-email">{{ currentUser.email }}</p>
      }
      <p class="px-md pb-0.5 pt-xs text-eyebrow uppercase text-subtle">Create</p>
      <a
        routerLink="/events/new"
        role="menuitem"
        class="flex items-center gap-xs px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
        data-testid="create-event-link"
        (click)="close()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-muted" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4M12 12.5v4M10 14.5h4"/></svg>
        Create event
      </a>
      <a
        routerLink="/teams/new"
        role="menuitem"
        class="flex items-center gap-xs border-b border-border-muted px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
        data-testid="create-team-link"
        (click)="close()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="text-muted" aria-hidden="true"><path d="M16 19v-1.5A3.5 3.5 0 0 0 12.5 14h-5A3.5 3.5 0 0 0 4 17.5V19"/><circle cx="10" cy="8" r="3.5"/><path d="M19 8v5M21.5 10.5h-5"/></svg>
        Create team
      </a>
      <a
        routerLink="/profile"
        role="menuitem"
        class="block px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
        (click)="close()"
      >
        Profile
      </a>
      <a
        routerLink="/account"
        role="menuitem"
        class="block px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
        (click)="close()"
      >
        Account
      </a>
      <a
        routerLink="/settings/notifications"
        role="menuitem"
        class="block px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
        (click)="close()"
      >
        Notification settings
      </a>
      @if (isAdmin()) {
        <a
          routerLink="/admin"
          role="menuitem"
          class="flex items-center gap-xs border-t border-border-muted px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
          data-testid="admin-link"
          (click)="close()"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="h-4 w-4 text-muted" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
          Admin panel
        </a>
      }
      <button
        type="button"
        role="menuitem"
        class="block w-full border-t border-border-muted px-md py-xs text-left text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-sunken focus-visible:bg-surface-sunken focus-visible:outline-none"
        data-testid="sign-out"
        (click)="signOut()"
      >
        Sign out
      </button>
    </div>
  }
</div>
