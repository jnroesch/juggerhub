<header
  class="sticky top-0 z-30 flex h-14 items-center gap-sm border-b border-border bg-surface px-md"
>
  <!-- Brand -->
  <a routerLink="/" class="flex items-center gap-xs" aria-label="JuggerHub home">
    <span class="grid h-7 w-7 place-items-center rounded-md bg-brand-gradient shadow-sm" aria-hidden="true">
      <span class="h-1.5 w-1.5 rounded-full bg-highlight"></span>
    </span>
    <span class="font-display text-heading-md font-bold text-ink">JuggerHub</span>
  </a>

  <!-- Desktop: primary destinations -->
  <nav class="ml-lg hidden items-center gap-xs md:flex" aria-label="Primary">
    <a
      routerLink="/"
      class="flex items-center gap-xs rounded-md px-sm py-xs text-body-sm font-medium transition-colors duration-fast"
      [class]="homeActive() ? 'bg-surface-accent-soft text-brand-active font-semibold' : 'text-text hover:bg-surface-sunken'"
      [attr.aria-current]="homeActive() ? 'page' : null"
      data-testid="nav-home"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      Home
    </a>
    <a
      routerLink="/browse"
      class="flex items-center gap-xs rounded-md px-sm py-xs text-body-sm font-medium transition-colors duration-fast"
      [class]="browseActive() ? 'bg-surface-accent-soft text-brand-active font-semibold' : 'text-text hover:bg-surface-sunken'"
      [attr.aria-current]="browseActive() ? 'page' : null"
      data-testid="nav-browse"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Browse
    </a>
    <a
      [routerLink]="myTeamHref()"
      class="flex items-center gap-xs rounded-md px-sm py-xs text-body-sm font-medium transition-colors duration-fast"
      [class]="myTeamActive() ? 'bg-surface-accent-soft text-brand-active font-semibold' : 'text-text hover:bg-surface-sunken'"
      [attr.aria-current]="myTeamActive() ? 'page' : null"
      data-testid="nav-my-team"
    >
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 19v-1.5A3.5 3.5 0 0 0 12.5 14h-5A3.5 3.5 0 0 0 4 17.5V19"/><circle cx="10" cy="8" r="3.5"/><path d="M20 19v-1.5a3.5 3.5 0 0 0-2.5-3.35"/><path d="M15.5 4.6a3.5 3.5 0 0 1 0 6.8"/></svg>
      My team
    </a>
    <a
      routerLink="/chat"
      class="flex items-center gap-xs rounded-md px-sm py-xs text-body-sm font-medium transition-colors duration-fast"
      [class]="chatActive() ? 'bg-surface-accent-soft text-brand-active font-semibold' : 'text-text hover:bg-surface-sunken'"
      [attr.aria-current]="chatActive() ? 'page' : null"
      [attr.aria-label]="chatBadge() ? 'Chat, ' + chatBadge() + ' unread' : 'Chat'"
      data-testid="nav-chat"
    >
      <span class="relative">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        @if (chatBadge(); as badge) {
          <span
            class="absolute -right-2 -top-1.5 grid h-4 min-w-4 place-items-center rounded-pill bg-brand px-1 font-mono text-[10px] font-bold leading-none text-on-accent"
            aria-hidden="true"
            data-testid="nav-chat-badge"
          >{{ badge }}</span>
        }
      </span>
      Chat
    </a>
  </nav>

  <!-- Right side: bell + avatar (desktop) / avatar only (mobile strip — Alerts lives in the bottom tab bar) -->
  <div class="ml-auto flex items-center gap-sm">
    <a
      routerLink="/alerts"
      class="relative hidden h-9 w-9 place-items-center rounded-md transition-colors duration-fast focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-focus md:grid"
      [class]="alertsActive() ? 'bg-surface-accent-soft text-brand-active' : 'text-text hover:bg-surface-sunken'"
      [attr.aria-current]="alertsActive() ? 'page' : null"
      [attr.aria-label]="alertsBadge() ? 'Alerts, ' + alertsBadge() + ' unread' : 'Alerts'"
      data-testid="nav-alerts-bell"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 6 2.5 7 2.5 7h-17S6 14 6 8"/><path d="M10.5 20a2 2 0 0 0 3 0"/></svg>
      @if (alertsBadge(); as badge) {
        <span
          class="absolute -right-0.5 -top-0.5 grid h-4 min-w-4 place-items-center rounded-pill bg-brand px-1 text-[10px] font-bold leading-none text-on-accent"
          aria-hidden="true"
          data-testid="nav-alerts-badge"
        >{{ badge }}</span>
      }
    </a>
    <jh-avatar-menu />
  </div>
</header>
