<header
  class="sticky top-0 z-30 flex h-14 items-center gap-sm border-b border-border bg-surface px-md"
>
  <button
    type="button"
    class="grid h-9 w-9 place-items-center rounded-md text-text hover:bg-surface-subtle md:hidden"
    aria-label="Toggle navigation"
    data-testid="menu-toggle"
    (click)="menuToggle.emit()"
  >
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
    </svg>
  </button>

  <span class="flex items-center gap-xs">
    <span
      class="grid h-7 w-7 place-items-center rounded-md bg-brand-gradient shadow-sm"
      aria-hidden="true"
    >
      <span class="h-1.5 w-1.5 rounded-full bg-highlight"></span>
    </span>
    <span class="font-display text-heading-md font-bold text-ink">JuggerHub</span>
  </span>

  <div class="ml-auto flex items-center gap-sm">
    @if (user(); as currentUser) {
      <span class="hidden text-body-sm text-subtle sm:inline" data-testid="nav-user">{{ currentUser.email }}</span>
      <button
        type="button"
        class="rounded-md border border-border-strong bg-surface px-md py-xs text-body-sm font-medium text-text transition-colors duration-fast hover:bg-surface-subtle focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-focus"
        data-testid="sign-out"
        (click)="signOut()"
      >
        Sign out
      </button>
    } @else {
      <a
        routerLink="/sign-in"
        class="rounded-md bg-brand px-md py-xs text-body-sm font-semibold text-on-accent transition-all duration-fast hover:bg-brand-hover hover:shadow-coral active:translate-y-px focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-focus"
        data-testid="nav-sign-in"
      >
        Sign in
      </a>
    }
  </div>
</header>
