<header
  class="sticky top-0 z-30 flex h-14 items-center gap-sm border-b border-border bg-surface px-md"
>
  <button
    type="button"
    class="grid h-9 w-9 place-items-center rounded-md text-text hover:bg-surface-subtle md:hidden"
    aria-label="Toggle navigation"
    data-testid="menu-toggle"
    (click)="menuToggle.emit()"
  >
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
    </svg>
  </button>

  <span class="text-heading-md font-semibold text-ink">JuggerHub</span>

  <div class="ml-auto flex items-center gap-sm">
    @if (user(); as currentUser) {
      <span class="hidden text-body-sm text-subtle sm:inline" data-testid="nav-user">{{ currentUser.email }}</span>
      <button
        type="button"
        class="rounded-md border border-border-strong bg-surface-subtle px-md py-xs text-body-sm font-medium text-text hover:bg-border"
        data-testid="sign-out"
        (click)="signOut()"
      >
        Sign out
      </button>
    } @else {
      <a
        routerLink="/sign-in"
        class="rounded-md bg-primary px-md py-xs text-body-sm font-semibold text-surface hover:bg-primary-hover"
        data-testid="nav-sign-in"
      >
        Sign in
      </a>
    }
  </div>
</header>
