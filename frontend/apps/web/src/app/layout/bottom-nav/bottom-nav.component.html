<nav
  class="bottom-nav fixed inset-x-0 bottom-0 z-30 flex items-stretch border-t border-border bg-surface md:hidden"
  aria-label="Primary"
  data-testid="bottom-nav"
>
  <a
    routerLink="/"
    class="flex flex-1 flex-col items-center justify-center gap-0.5 py-xs text-caption transition-colors duration-fast"
    [class]="active('home') ? 'text-brand-active font-semibold' : 'text-subtle'"
    [attr.aria-current]="active('home') ? 'page' : null"
    data-testid="tab-home"
  >
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
    Home
  </a>
  <a
    routerLink="/browse"
    class="flex flex-1 flex-col items-center justify-center gap-0.5 py-xs text-caption transition-colors duration-fast"
    [class]="active('browse') ? 'text-brand-active font-semibold' : 'text-subtle'"
    [attr.aria-current]="active('browse') ? 'page' : null"
    data-testid="tab-browse"
  >
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    Browse
  </a>
  <a
    [routerLink]="myTeamHref()"
    class="flex flex-1 flex-col items-center justify-center gap-0.5 py-xs text-caption transition-colors duration-fast"
    [class]="active('my-team') ? 'text-brand-active font-semibold' : 'text-subtle'"
    [attr.aria-current]="active('my-team') ? 'page' : null"
    data-testid="tab-my-team"
  >
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16 19v-1.5A3.5 3.5 0 0 0 12.5 14h-5A3.5 3.5 0 0 0 4 17.5V19"/><circle cx="10" cy="8" r="3.5"/><path d="M20 19v-1.5a3.5 3.5 0 0 0-2.5-3.35"/><path d="M15.5 4.6a3.5 3.5 0 0 1 0 6.8"/></svg>
    My team
  </a>
  <a
    routerLink="/chat"
    class="flex flex-1 flex-col items-center justify-center gap-0.5 py-xs text-caption transition-colors duration-fast"
    [class]="active('chat') ? 'text-brand-active font-semibold' : 'text-subtle'"
    [attr.aria-current]="active('chat') ? 'page' : null"
    data-testid="tab-chat"
  >
    <span class="relative">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      @if (chatBadge(); as badge) {
        <span
          class="absolute -right-2 -top-1 grid h-4 min-w-4 place-items-center rounded-pill bg-brand px-1 font-mono text-[10px] font-bold leading-none text-white"
          [attr.aria-label]="badge + ' unread messages'"
          data-testid="tab-chat-badge"
        >{{ badge }}</span>
      }
    </span>
    Chat
  </a>
  <a
    routerLink="/alerts"
    class="flex flex-1 flex-col items-center justify-center gap-0.5 py-xs text-caption transition-colors duration-fast"
    [class]="active('alerts') ? 'text-brand-active font-semibold' : 'text-subtle'"
    [attr.aria-current]="active('alerts') ? 'page' : null"
    data-testid="tab-alerts"
  >
    <span class="relative">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 8a6 6 0 0 1 12 0c0 6 2.5 7 2.5 7h-17S6 14 6 8"/><path d="M10.5 20a2 2 0 0 0 3 0"/></svg>
      @if (alertsBadge(); as badge) {
        <span
          class="absolute -right-2 -top-1 grid h-4 min-w-4 place-items-center rounded-pill bg-brand px-1 text-[10px] font-bold leading-none text-white"
          aria-hidden="true"
          data-testid="tab-alerts-badge"
        >{{ badge }}</span>
      }
    </span>
    Alerts
  </a>
</nav>
